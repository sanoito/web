<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="270px" height="30px" 
     viewBox="0 0 38 4" 
     preserveAspectRatio="xMidYMid meet"
     style="shape-rendering:geometricPrecision; text-rendering:geometricPrecision;">
  
  <defs>
    <style type="text/css">
      .fil0 {fill:black;fill-rule:nonzero}
      .fil1 {fill:none;fill-rule:nonzero}
      .fil2 {fill:#FEFEFE}
      .fil3 {fill:none}
      /* Giảm stroke-width xuống 0.05 để nét vẽ thanh mảnh khi phóng to */
      .str0 {stroke:black;stroke-width:0.05;stroke-miterlimit:2.6}
      .str1 {stroke:#373435;stroke-width:0.05;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:2.6}
      .str2 {stroke:#373435;stroke-width:0.05;stroke-miterlimit:2.6}
      .str3 {stroke:#373435;stroke-width:0.05;stroke-miterlimit:2.6}
      .str4 {stroke:black;stroke-width:0.05;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:2.6}
      .str5 {stroke:black;stroke-width:0.06;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:2.6}
    </style>
  </defs>

  <g transform="translate(0.75, 0.5)">
     </g>
</svg>
